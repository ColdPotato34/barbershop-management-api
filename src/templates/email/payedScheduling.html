<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #121212;
            margin: 0;
            padding: 0;
            color: #ffffff !important;
        }

        .container {
            width: 100%;
            max-width: 600px;
            margin: 20px auto;
            background-color: #1a1a1a;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #333;
        }

        .header {
            background-color: #121212;
            padding: 30px 20px;
            text-align: center;
            border-bottom: 2px solid #ff5722;
        }

        .logo {
            font-size: 26px;
            font-weight: bold;
            color: #ffffff !important;
            text-transform: uppercase;
        }

        .logo span {
            color: #ff5722 !important;
        }

        .content {
            padding: 40px;
            line-height: 1.6;
            color: #ffffff !important;
            text-align: center;
        }

        .price {
            font-size: 36px;
            color: #ff5722 !important;
            font-weight: bold;
            margin: 20px 0;
        }

        .details-box {
            background: #252525;
            padding: 20px;
            border-radius: 5px;
            text-align: left;
            margin: 20px 0;
            border-left: 4px solid #ff5722;
            color: #ddd !important;
        }

        .footer {
            padding: 20px;
            text-align: center;
            font-size: 11px;
            color: #777;
            background-color: #121212;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <div class="logo">💈 Alpha<span>Cuts</span></div>
            <div style="color: #777; font-size: 12px; margin-top: 5px;">Recibo de Atendimento</div>
        </div>
        <div class="content">
            <h1 style="color: #ffffff !important;">Obrigado, ${nome}! ✂️</h1>
            <p>Seu atendimento foi finalizado com sucesso.</p>

            <div class="price">${valor}</div>

            <div class="details-box">
                <p style="margin: 5px 0;"><strong>Serviço:</strong> ${servico}</p>
                <p style="margin: 5px 0;"><strong>Status:</strong> <span style="color: #4caf50;">Pago / Concluído</span>
                </p>
            </div>

            <p style="color: #aaa; font-size: 14px;">Sua satisfação é nossa prioridade. Até a próxima!</p>
        </div>
        <div class="footer">
            &copy; 2026 AlphaCuts - Management System
        </div>
    </div>
</body>

</html>
